[[webhooks.subscriptions]]
topics = [ "orders/create" ]
uri = "/webhooks/shopify/orders_create"

[[webhooks.subscriptions]]
topics = [ "orders/updated" ]
uri = "/webhooks/shopify/orders_updated"

[[webhooks.subscriptions]]
topics = [ "customers/create" ]
uri = "/webhooks/shopify/customers_create"

[[webhooks.subscriptions]]
