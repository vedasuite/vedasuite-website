client_id = "b7789c5899a579e9bc9e950a9bbd6547"
name = "VedaSuite AI"
handle = "vedasuite-ai"
application_url = "https://margarete-conidian-pearlie.ngrok-free.dev"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[access_scopes]
scopes = "read_products,write_products,read_orders,write_orders,read_customers,write_own_subscription"

[auth]
redirect_urls = [
  "https://margarete-conidian-pearlie.ngrok-free.dev/auth/callback"
]

[webhooks]
api_version = "2024-01"

[[webhooks.subscriptions]]
