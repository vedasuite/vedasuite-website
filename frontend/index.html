<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VedaSuite AI</title>
    <meta name="shopify-api-key" content="b7789c5899a579e9bc9e950a9bbd6547" />
    <script src="https://cdn.shopify.com/shopifycloud/app-bridge.js"></script>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f6f7;
        color: #202223;
      }
      #boot-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .boot-card {
        width: min(560px, 100%);
        background: #fff;
        border-radius: 18px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        padding: 28px;
      }
      .boot-title {
        font-size: 28px;
        font-weight: 700;
        margin: 0 0 8px;
      }
      .boot-copy {
        margin: 0;
        color: #6d7175;
      }
      .boot-bar {
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(90deg, #0f172a, #1d4ed8, #0f172a);
        background-size: 200% 100%;
        margin-top: 20px;
        animation: bootPulse 1.6s linear infinite;
      }
      @keyframes bootPulse {
        from { background-position: 0% 50%; }
        to { background-position: 200% 50%; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-shell">
        <div class="boot-card">
          <h1 class="boot-title">Loading VedaSuite AI</h1>
          <p class="boot-copy">Preparing your Shopify connection, plan access, and store intelligence.</p>
          <div class="boot-bar"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
